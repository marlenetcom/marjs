<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dog Gallery</title>
    <link href="css/style.css" rel="stylesheet">

<h1>Dog Gallery</h1>

<body onload="setImages()">

            onblur="onblurfunction()" onmouseover="upDate(this)" onmouseout="unDo()">
        <img src="images/dog4.jpg" alt="dachshund 4" width="100" onfocus="onfocusfunction(this)"
            onblur="onblurfunction()" onmouseover="upDate(this)" onmouseout="unDo()">
        <img src="images/dog5.jpg" alt="dachshund 5" width="100" onfocus="onfocusfunction(this)"
            onblur="onblurfunction()" onmouseover="upDate(this)" onmouseout="unDo()">
        <img src="images/dog6.jpg" alt="dachshund 6" width="100" onfocus="onfocusfunction(this)"
            onblur="onblurfunction()" onmouseover="upDate(this)" onmouseout="unDo()">
    </div><br>
    <div id="image">
        Hover over an image below to display here.
    </div><br>
    <script src="js/myscript.js"></script>

</body>

</html>
